<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#050a12"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="50%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#ce93d8"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="coreBlur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="hexClip">
      <polygon points="200,30 340,110 340,290 200,370 60,290 60,110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGlow)" rx="24"/>

  <!-- Subtle star field -->
  <g opacity="0.5">
    <circle cx="60" cy="55" r="1" fill="#eceff1" opacity="0.7"/>
    <circle cx="130" cy="35" r="0.8" fill="#4fc3f7" opacity="0.9"/>
    <circle cx="290" cy="42" r="1.2" fill="#eceff1" opacity="0.5"/>
    <circle cx="350" cy="80" r="0.7" fill="#ce93d8" opacity="0.8"/>
    <circle cx="38" cy="160" r="0.9" fill="#eceff1" opacity="0.6"/>
    <circle cx="370" cy="195" r="1" fill="#4fc3f7" opacity="0.7"/>
    <circle cx="55" cy="320" r="0.8" fill="#ce93d8" opacity="0.6"/>
    <circle cx="340" cy="340" r="1.1" fill="#eceff1" opacity="0.5"/>
    <circle cx="110" cy="370" r="0.7" fill="#4fc3f7" opacity="0.7"/>
    <circle cx="310" cy="368" r="0.9" fill="#eceff1" opacity="0.6"/>
    <circle cx="170" cy="22" r="0.6" fill="#a5d6a7" opacity="0.8"/>
    <circle cx="380" cy="140" r="0.8" fill="#eceff1" opacity="0.5"/>
  </g>

  <!-- Core ambient glow -->
  <circle cx="200" cy="200" r="130" fill="url(#coreGlow)" filter="url(#coreBlur)"/>

  <!-- Outer orbit ring -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="url(#ringGrad1)" stroke-width="0.8" opacity="0.6" stroke-dasharray="4 6"/>

  <!-- Mid ring with tick marks -->
  <circle cx="200" cy="200" r="132" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.25"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#4fc3f7" stroke-width="1" opacity="0.5">
    <!-- 12 ticks at 30deg intervals -->
    <line x1="200" y1="45" x2="200" y2="55"/>
    <line x1="277.5" y1="67.5" x2="271.7" y2="75.5"/>
    <line x1="332.5" y1="122.5" x2="324.5" y2="128.3"/>
    <line x1="355" y1="200" x2="345" y2="200"/>
    <line x1="332.5" y1="277.5" x2="324.5" y2="271.7"/>
    <line x1="277.5" y1="332.5" x2="271.7" y2="324.5"/>
    <line x1="200" y1="355" x2="200" y2="345"/>
    <line x1="122.5" y1="332.5" x2="128.3" y2="324.5"/>
    <line x1="67.5" y1="277.5" x2="75.5" y2="271.7"/>
    <line x1="45" y1="200" x2="55" y2="200"/>
    <line x1="67.5" y1="122.5" x2="75.5" y2="128.3"/>
    <line x1="122.5" y1="67.5" x2="128.3" y2="75.5"/>
  </g>

  <!-- Inner structural ring -->
  <circle cx="200" cy="200" r="108" fill="none" stroke="url(#ringGrad2)" stroke-width="1" opacity="0.4"/>

  <!-- Hexagonal frame (subtle) -->
  <polygon points="200,92 285,140 285,236 200,284 115,236 115,140"
    fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.15"/>

  <!-- Corner accent brackets -->
  <g stroke="#4fc3f7" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M 72 72 L 72 90 M 72 72 L 90 72"/>
    <path d="M 328 72 L 328 90 M 328 72 L 310 72"/>
    <path d="M 72 328 L 72 310 M 72 328 L 90 328"/>
    <path d="M 328 328 L 328 310 M 328 328 L 310 328"/>
  </g>

  <!-- The K letterform — bold, geometric, with AI cursor integrated -->
  <g filter="url(#softGlow)">

    <!-- K vertical stem -->
    <rect x="138" y="128" width="22" height="144" rx="3" fill="url(#kGrad)"/>

    <!-- K upper diagonal arm (top-right) -->
    <polygon points="160,128 160,148 238,200 218,200" fill="url(#kGrad)"/>

    <!-- K lower diagonal arm (bottom-right) -->
    <polygon points="160,272 160,252 238,200 218,200" fill="url(#kGrad)"/>

  </g>

  <!-- Terminal cursor block — integrated at the tip of the lower arm, with glow -->
  <g filter="url(#glow)">
    <rect x="238" y="188" width="16" height="24" rx="2" fill="url(#cursorGrad)" opacity="0.95"/>
    <!-- Cursor blink line (bottom accent) -->
    <rect x="238" y="210" width="16" height="3" rx="1" fill="#a5d6a7" opacity="0.7"/>
  </g>

  <!-- Small signal dot at top of K arm -->
  <circle cx="238" cy="200" r="3.5" fill="#4fc3f7" filter="url(#glow)" opacity="0.9"/>

  <!-- KIRN wordmark below -->
  <text
    x="200" y="322"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="22"
    font-weight="700"
    letter-spacing="10"
    text-anchor="middle"
    fill="#eceff1"
    opacity="0.92"
  >KIRN</text>

  <!-- Tagline -->
  <text
    x="200" y="342"
    font-family="'Courier New', monospace"
    font-size="8"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#4fc3f7"
    opacity="0.55"
  >AI · TERMINAL · SHELL</text>

  <!-- Subtle scan line effect overlay -->
  <rect width="400" height="400" rx="24"
    fill="none"
    stroke="#4fc3f7"
    stroke-width="1"
    opacity="0.1"/>

</svg>
